<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">

  <meta name="theme-color" content="#052962">

  <link rel="icon" href="assets/icons/favicon.ico">
  <link rel="icon" type="image/png" href="assets/favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

  <title>ESTİ BİRAZ</title>

<body>

<header class="header" id="header">
  <div class="container header__inner" style="display: flex; justify-content: space-between; align-items: center; padding: 16px 0;">
    <a href="#/" class="header__logo" aria-label="Esti Biraz ana sayfa" style="display: flex; align-items: center; gap: 12px; font-weight: 900; font-family: Georgia, serif; font-size: 1.5rem;">
      <img src="assets/logo.png" alt="" class="header__logo-img" style="width: 42px; height: 42px; border-radius: 50%;">
      Esti Biraz
    </a>

    <nav class="header__nav section-nav__inner" id="mainNav" style="display: flex; gap: 16px;">
      <a href="#/" class="active">Ana Sayfa</a>
      <a href="#/makaleler">Makaleler</a>
      <a href="#/akademi">Akademi</a>
      <a href="#/hakkinda">Hakkında</a>
    </nav>

    <div class="header__actions" id="headerAuth">
      <button class="btn btn--primary btn--sm" id="btnLogin" onclick="login()">Giriş Yap</button>
    </div>
  </div>
</header>

<main class="main" id="app">
  <div class="container" style="padding: 60px 0; text-align: center;">
    <p style="font-weight: 800; color: #123f7a;">Yükleniyor...</p>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<script src="js/auth.js"></script>
<script src="js/image-upload.js"></script>
<script src="js/seo.js"></script>
<script src="js/editor.js"></script>
<script src="js/article-interactions.js"></script>
<script src="js/article-submit.js"></script>
<script src="js/article-detail.js"></script>
<script src="js/admin.js"></script>

<script src="js/router.js"></script>
